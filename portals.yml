# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.

search_queries:
  # -- Ashby --
  - name: Ashby — Senior SDET
    query: 'site:jobs.ashbyhq.com "SDET" OR "Senior SDET" OR "Software Engineer in Test" "United States" OR "Remote"'
    enabled: true

  - name: Ashby — QA Automation
    query: 'site:jobs.ashbyhq.com "QA Automation" OR "Automation Engineer" OR "Test Automation" senior "United States" OR "Remote"'
    enabled: true

  - name: Ashby — Test Architect
    query: 'site:jobs.ashbyhq.com "Test Architect" OR "QA Lead" OR "Quality Engineer" "United States" OR "Remote"'
    enabled: true

  # -- Greenhouse --
  - name: Greenhouse — Senior SDET
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "SDET" OR "Software Engineer in Test" OR "Senior SDET" "United States" OR "Remote"'
    enabled: true

  - name: Greenhouse — QA Automation
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "QA Automation" OR "Automation Engineer" OR "Test Automation" senior "United States" OR "Remote"'
    enabled: true

  - name: Greenhouse — Test Architect
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Test Architect" OR "QA Lead" OR "Quality Engineer" "United States" OR "Remote"'
    enabled: true

  # -- Lever --
  - name: Lever — SDET & QA
    query: 'site:jobs.lever.co "SDET" OR "QA Automation" OR "Automation Engineer" OR "Engineer in Test" "United States" OR "Remote"'
    enabled: true

  - name: Lever — Test Lead
    query: 'site:jobs.lever.co "QA Lead" OR "Test Architect" OR "Quality Assurance Lead" OR "Test Engineer" senior "United States" OR "Remote"'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — SDET & QA
    query: 'site:wellfound.com "SDET" OR "QA Automation" OR "Automation Engineer" OR "Test Engineer" "United States" OR "Remote"'
    enabled: true

  # -- Workable --
  - name: Workable — QA Automation
    query: 'site:apply.workable.com "QA Automation" OR "SDET" OR "Test Automation" OR "Automation Engineer" "United States" OR "Remote"'
    enabled: true

  # -- LinkedIn (US, role-specific) --
  - name: LinkedIn — Staff/Senior SDET US
    query: 'site:linkedin.com/jobs "Staff SDET" OR "Senior SDET" "United States"'
    enabled: true

  - name: LinkedIn — QA Automation Engineer US
    query: 'site:linkedin.com/jobs "QA Automation Engineer" OR "Senior QA Automation" "United States"'
    enabled: true

  - name: LinkedIn — Test Architect US
    query: 'site:linkedin.com/jobs "Test Architect" OR "QA Lead" OR "Software Engineer in Test" "United States"'
    enabled: true

  - name: LinkedIn — Automation Engineer Selenium Playwright
    query: 'site:linkedin.com/jobs "Automation Engineer" Selenium OR Playwright "United States" senior'
    enabled: true

  # -- Indeed (US, tighter filters) --
  - name: Indeed — Senior SDET US
    query: 'site:indeed.com "Senior SDET" OR "Staff SDET" "United States"'
    enabled: true

  - name: Indeed — QA Automation Engineer US
    query: 'site:indeed.com "QA Automation Engineer" OR "Senior QA Automation" "United States"'
    enabled: true

  - name: Indeed — Software Engineer in Test
    query: 'site:indeed.com "Software Engineer in Test" OR "Test Automation Engineer" senior'
    enabled: true

  - name: Indeed — Playwright Selenium Automation
    query: 'site:indeed.com "Automation Engineer" Playwright OR Selenium senior'
    enabled: true

  # -- Glassdoor --
  - name: Glassdoor — Senior SDET
    query: 'site:glassdoor.com "Senior SDET" OR "QA Automation Engineer" OR "Staff SDET" "United States"'
    enabled: true

  # -- Dice (tech jobs US) --
  - name: Dice — SDET QA Automation
    query: 'site:dice.com "SDET" OR "QA Automation" OR "Automation Engineer" OR "Engineer in Test" "United States" OR "Remote"'
    enabled: true

  # -- Builtin (startup-focused US) --
  # NOTE: Builtin.com frequently serves old/expired listings — liveness check mandatory for all results
  - name: Builtin — SDET QA Automation
    query: 'site:builtin.com "SDET" OR "QA Automation" OR "Automation Engineer" OR "Software Engineer in Test" after:2025-10-01'
    enabled: true

  # -- We Work Remotely (remote-only, high quality senior tech) --
  - name: WeWorkRemotely — SDET QA Automation
    query: 'site:weworkremotely.com "SDET" OR "QA Automation" OR "Automation Engineer" OR "Software Engineer in Test" OR "Test Automation"'
    enabled: true

  # -- Remotive (remote-only, found Intrado here) --
  # NOTE: Remotive can show non-US remote roles — location filter enforced at scan step
  - name: Remotive — SDET QA Automation
    query: 'site:remotive.com "SDET" OR "QA Automation" OR "Software Engineer in Test" OR "Test Automation" OR "Automation Engineer" "United States" OR "worldwide" OR "anywhere"'
    enabled: true

  # -- Himalayas (remote-first, growing fast) --
  - name: Himalayas — SDET QA Senior
    query: 'site:himalayas.app "SDET" OR "QA Automation" OR "Software Engineer in Test" OR "Automation Engineer" senior "United States" OR "Remote"'
    enabled: true

  # -- YC Work at a Startup (AI/funded startups) --
  - name: YC — SDET QA Automation
    query: 'site:workatastartup.com "SDET" OR "QA" OR "Automation Engineer" OR "Test Engineer" OR "Software Engineer in Test" "United States" OR "Remote"'
    enabled: true

  # -- iCIMS (enterprise ATS — Intrado, many mid/large companies) --
  - name: iCIMS — SDET QA Automation
    query: 'site:careers.icims.com "SDET" OR "QA Automation" OR "Automation Engineer" OR "Software Engineer in Test" "United States" OR "Remote"'
    enabled: true

  # -- SmartRecruiters (enterprise ATS) --
  - name: SmartRecruiters — SDET QA Automation
    query: 'site:careers.smartrecruiters.com "SDET" OR "QA Automation" OR "Automation Engineer" OR "Software Engineer in Test" "United States" OR "Remote"'
    enabled: true

  # -- Breezy HR (startups/SMB ATS) --
  - name: BreezyHR — SDET QA Automation
    query: 'site:app.breezy.hr "SDET" OR "QA Automation" OR "Automation Engineer" OR "Test Automation" "United States" OR "Remote"'
    enabled: true

  # -- Teamtailor (EU/startup ATS, some US companies) --
  - name: Teamtailor — SDET QA Automation
    query: 'site:teamtailor.com "SDET" OR "QA Automation" OR "Software Engineer in Test" OR "Automation Engineer" "United States" OR "Remote"'
    enabled: true

  # -- ZipRecruiter (US-focused, high volume) --
  - name: ZipRecruiter — Senior SDET US
    query: 'site:ziprecruiter.com "Senior SDET" OR "Staff SDET" OR "Software Engineer in Test" "United States" OR "Remote"'
    enabled: true

  - name: ZipRecruiter — QA Automation Engineer US
    query: 'site:ziprecruiter.com "QA Automation Engineer" OR "Automation Engineer" OR "Test Automation" senior "United States" OR "Remote"'
    enabled: true

  - name: ZipRecruiter — SDET QA Lead US
    query: 'site:ziprecruiter.com "SDET" OR "QA Lead" OR "Engineer in Test" "United States" OR "Remote"'
    enabled: true

  # -- Contract / C2C / W2 contract positions --
  - name: Contract — SDET QA Automation Greenhouse/Lever/Ashby
    query: '"SDET" OR "QA Automation" OR "Software Engineer in Test" contract "United States" OR "Remote" site:job-boards.greenhouse.io OR site:jobs.lever.co OR site:jobs.ashbyhq.com'
    enabled: true

  - name: Contract — SDET ZipRecruiter
    query: 'site:ziprecruiter.com "SDET" OR "QA Automation Engineer" OR "Test Automation Engineer" contract "United States" OR "Remote"'
    enabled: true

  - name: Contract — SDET Indeed
    query: 'site:indeed.com "SDET" OR "QA Automation Engineer" OR "Software Engineer in Test" contract "United States"'
    enabled: true

  - name: Contract — SDET Dice (tech contract hub)
    query: 'site:dice.com "SDET" OR "QA Automation" OR "Automation Engineer" contract OR "contract-to-hire" OR "C2C" "United States" OR "Remote"'
    enabled: true

  # -- Cross-portal broad --
  - name: All portals — Playwright Selenium SDET
    query: '"SDET" OR "Automation Engineer" Playwright OR Selenium senior "United States" OR "Remote" site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

