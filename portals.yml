    - "France"
    - "Netherlands"
    # Americas (non-US)
    - "Canada"
    - "Mexico"
    - "Brazil"
    - "Argentina"
    - "Colombia"
    - "Chile"
    - "Peru"
    - "LATAM"
    - "Latin America"
    # Europe
