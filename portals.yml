# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Core SDET / QA abbreviations --
    - "SDET"
    - "SET"
    - "SDE-T"
    - "SDE/T"
    - "QA"
    - "QE"

    # -- Quality Assurance / Quality Engineer variants --
    - "Quality Assurance"
    - "Quality Engineer"
    - "Quality Analyst"
    - "Quality Specialist"
    - "Quality Lead"
    - "Quality Manager"
    - "Quality Ops"
    - "Quality Operations"
    - "Quality Software"
    - "Software Quality"

    # -- Test Engineer / Test Automation variants --
    - "Test Engineer"
    - "Testing Engineer"
    - "Test Automation"
    - "Automated Test"
    - "Test Analyst"
    - "Test Lead"
    - "Test Manager"
    - "Test Architect"
    - "Test Infrastructure"
    - "Test Developer"
    - "Test Ops"
    - "TestOps"

    # -- Automation Engineer variants --
    - "Automation Engineer"
    - "Automation Architect"
    - "Automation Developer"
    - "Automation QA"
    - "Automation Lead"

    # -- Software Engineer in Test / Developer in Test variants --
    - "Software Engineer in Test"
    - "Software Development Engineer in Test"
    - "Engineer in Test"
    - "Developer in Test"
    - "Software Test"

    # -- QA Lead / Manager / Specialist --
    - "QA Lead"
    - "QA Manager"
    - "QA Specialist"
    - "QA Tester"
    - "QA Architect"
    - "QA Engineer"
    - "QA Analyst"

    # -- Framework / Tool keywords (catch tool-named roles) --
    - "Selenium"
    - "Playwright"
    - "Cypress"
    - "WebdriverIO"
    - "Appium"
    - "TestNG"
    - "JUnit"
    - "Pytest"
    - "RSpec"
    - "Cucumber"
    - "RestAssured"
    - "Rest Assured"
    - "Karate"

    # -- Performance / Load / Security testing --
    - "Performance Test"
    - "Load Test"
    - "Stress Test"
    - "Performance Engineer"

    # -- API / Backend test roles --
    - "API Automation"
    - "API Test"
    - "Backend Test"

    # -- CI/CD / DevOps adjacent QA --
    - "Release Engineer"
    - "CI/CD Engineer"
    - "DevOps QA"
    - "Platform QA"
    - "Release Validation"
    - "Release Quality"

    # -- Full Stack / Other test titles --
    - "Full Stack Test"
    - "Full-Stack Test"
  # Contract positions are included — do NOT add "Contract" to negatives
  # Only skip if title is clearly non-SDET/QA (covered by positive filter)
  negative:
    # [CUSTOMIZE] Add keywords for roles you want to exclude
    - "Junior"
    - "Intern"

    - "Game QA"
    - "Game Tester"
    - "iOS"
    - "Android"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Mainframe"
    - "COBOL"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Director"

# -- Location filter --
# Applied AFTER title filter. A result passes if:
#   - Its location/metadata contains at least 1 positive term, OR has no location info (treated as remote)
#   - Its location/metadata contains 0 negative terms
# The scanner checks title, URL, snippet, and any location field returned by the API/WebSearch.
location_filter:
  # Accept: US locations, remote without explicit non-US location
  positive:
    - "United States"
    - "US"
    - "USA"
    - "Remote"
