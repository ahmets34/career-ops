          - strong [ref=e87]: "Gravie:"
        - paragraph [ref=e88]:
          - strong [ref=e89]
        - paragraph [ref=e90]: In order to create a more equitable and sustainable future for employer-sponsored health insurance, we need talented people doing amazing work. In exchange, we offer a great overall employee experience with opportunities for career growth, meaningful mission-driven work, and an above average total rewards package.
        - paragraph [ref=e91]
        - paragraph [ref=e92]: The salary range for this position is $124,271 - $207,118 annually. Numerous factors including, but not limited to, education, skills, work experience, certifications, etc. will be considered when determining compensation. I
        - paragraph [ref=e93]
        - paragraph [ref=e94]: Our unique benefits program is the gravy, i.e., the special sauce that sets our compensation package apart. In addition to standard health and wellness benefits, Gravie’s package includes alternative medicine coverage, generous PTO, up to 16 weeks paid parental leave, paid holidays, a 401k program, transportation perks, education reimbursement, and paid paw-ternity leave.
        - paragraph [ref=e95]
        - paragraph [ref=e96]:
          - strong [ref=e97]: "A Little More About Us:"
        - list [ref=e98]:
          - listitem [ref=e99]:
            - paragraph [ref=e100]: We know healthcare. Our company was founded and is still led by industry veterans who have started and grown several market-leading companies in the space.
          - listitem [ref=e101]:
            - paragraph [ref=e102]: We have raised money from top tier investors who share the same long-term vision as we do of building an industry defining company that will endure over the long run. We are well capitalized.
          - listitem [ref=e103]:
            - paragraph [ref=e104]: Our clients love us. Customer satisfaction rates among employees using Gravie health plans consistently rank above 80% – nearly 40 points above the industry average.
          - listitem [ref=e105]:
            - paragraph [ref=e106]: Our culture is unique. We tend to be non-hierarchical, merit-driven, opinionated but kind people who thrive working in a high-performance, fast-paced environment. People at Gravie care deeply about making a positive impact in the lives of the people we serve. We may not be the right place for everybody, but if you get energized by doing work every day that focuses on putting consumers at the front of the line, we could be a great place for you. It takes unique people and diverse perspectives to deliver our results. We encourage you to be your authentic self – we like you that way.
