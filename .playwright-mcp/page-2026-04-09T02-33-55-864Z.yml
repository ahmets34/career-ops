        - strong [ref=e22]: "About HighLevel:"
        - generic [ref=e23]: HighLevel is an AI powered, all-in-one white-label sales & marketing platform that empowers agencies, entrepreneurs, and businesses to elevate their digital presence and drive growth. We are proud to support a global and growing community of over 1 million businesses, comprised of agencies, consultants, and businesses of all sizes and industries. HighLevel empowers users with all the tools needed to capture, nurture, and close new leads into repeat customers. As of mid 2025, HighLevel processes over 4 billion API hits and handles more than 2.5 billion message events every day. Our platform manages over 470 terabytes of data distributed across five databases, operates with a network of over 250 microservices, and supports over 1 million hostnames.
        - strong [ref=e26]: "Our People:"
        - generic [ref=e27]: With over 1,500 team members across 15+ countries, we operate in a global, remote-first environment. We are building more than software; we are building a global community rooted in creativity, collaboration, and impact. We take pride in cultivating a culture where innovation thrives, ideas are celebrated, and people come first, no matter where they call home.
        - strong [ref=e30]: "Our Impact:"
        - generic [ref=e31]: As of mid 2025, our platform powers over 1.5 billion messages, helps generate over 200 million leads, and facilitates over 20 million conversations for the more than 1 million businesses we serve each month. Behind those numbers are real people growing their companies, connecting with customers, and making their mark - and we get to help make that happen.
        - strong [ref=e34]: "About the Role:"
        - generic [ref=e35]: We are looking for a hands-on Lead SDET with a strong product and engineering mindset to own, build, and scale the end-to-end quality function in a fast-growing startup environment.
        - generic [ref=e37]: This role goes beyond traditional QA leadership. You will design and build automation frameworks, influence architecture and design for testability, drive shift-left quality practices, and mentor a high-performing SDET team. You will work closely with Group, Product Managers, Engineering Managers, Security, and DevOps teams to ensure fast, reliable, and scalable product releases with minimal defect leakage.
