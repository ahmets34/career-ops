          - generic [ref=e72]:
            - heading "Life at Flex" [level=3] [ref=e73]:
              - strong [ref=e74]: Life at Flex
            - paragraph [ref=e75]: We understand that it takes a diverse team of highly intelligent, curious, determined, empathetic, and self aware people to grow a successful company. Our HQ is located in New York City, but we have employees located throughout the US, Australia, Canada and South America. We are growing quickly, but deliberately, with a focus on building an inclusive culture. Our dynamic team has incredible perspectives to share, just as we know you do, and we take great pride in being an equal opportunity workplace.
            - paragraph [ref=e76]:
              - strong [ref=e77]: Offices
            - paragraph [ref=e78]: Roles posted in New York, San Francisco, and Salt Lake City are hybrid positions with on-site expectations of 2-3 days per week in our local offices. For candidates outside of these areas, you may be eligible for our relocation assistance program.
            - paragraph [ref=e79]:
              - strong [ref=e80]: Benefits
            - paragraph [ref=e81]: "For full-time U.S. employees we offer:"
            - list [ref=e82]:
              - listitem [ref=e83]: Competitive medical, dental, and vision
              - listitem [ref=e84]: Company equity
              - listitem [ref=e85]: 401(k) plan with company match
              - listitem [ref=e86]: Unlimited paid time off + 13 company paid holidays
              - listitem [ref=e87]: Parental leave
              - listitem [ref=e88]: "Flex Cares Program: Non-profit company match + pet adoption coverage"
              - listitem [ref=e89]: Free Flex subscription
            - paragraph [ref=e90]: "For full-time non-U.S. employees, we offer:"
            - list [ref=e91]:
              - listitem [ref=e92]: Competitive compensation + company equity
              - listitem [ref=e93]: Unlimited PTO
