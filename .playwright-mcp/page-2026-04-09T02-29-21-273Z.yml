                  - strong [ref=e66]: "Tier B:"
                  - text: $122,400—$153,000 USD
              - listitem [ref=e67]:
                - emphasis [ref=e68]:
                  - strong [ref=e69]: "Tier C:"
                  - text: $115,600—$144,500 USD
            - paragraph [ref=e70]:
