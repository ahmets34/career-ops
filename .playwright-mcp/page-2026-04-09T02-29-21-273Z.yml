            - heading "Senior Software Development Engineer in Test (SDET)" [level=1] [ref=e14]
            - generic [ref=e15]:
              - img [ref=e16]
              - generic [ref=e18]: Remote (U.S.)
          - button "Apply" [ref=e19] [cursor=pointer]
        - generic [ref=e20]:
          - paragraph [ref=e22]: Flex is a growth-stage, NYC headquartered FinTech company that is creating the best rent payment experience. It’s hard to believe that it’s 2026 and paying rent on time is expensive, inflexible, and difficult. We’re here to change that! Flex enables our users to pay rent throughout the month on a schedule that better fits their finances and budget. Our mission is to empower as many renters as possible with flexibility over their most significant recurring expense. After deliberately keeping a stealth profile as we built up unprecedented investor support and an enthusiastic user base, we are looking for motivated individuals to help us keep our mission growing. Will you be a part of the team?
          - generic [ref=e23]:
            - heading "About the role" [level=3] [ref=e24]:
              - strong [ref=e25]: About the role
            - paragraph [ref=e26]: As a Senior SDET at Flex, you will own the test automation and quality efforts for entire product areas or major features. You will architect and optimize automation frameworks, lead test strategy for complex systems, and regularly collaborate across teams to deliver reliable and high-quality releases. This role offers the opportunity to mentor others, drive cross-functional quality improvements, and play a critical part in shaping the future of our engineering excellence.
            - heading "What you’ll do" [level=3] [ref=e27]:
              - strong [ref=e28]: What you’ll do
            - list [ref=e29]:
              - listitem [ref=e30]: Architect, implement, and optimize automated test frameworks for complex product areas, ensuring high reliability and maintainability
              - listitem [ref=e31]: Design, develop, and maintain robust automated test suites for API, UI, and integration testing
              - listitem [ref=e32]: Lead test strategy development and perform risk analysis for major features and systems
              - listitem [ref=e33]: Integrate automated testing into CI/CD pipelines, supporting continuous integration and delivery processes
              - listitem [ref=e34]: Proactively identify systemic quality issues and drive cross-team process improvements to increase coverage and efficiency
              - listitem [ref=e35]: Analyze test coverage, identify gaps, and implement solutions to improve product quality
              - listitem [ref=e36]: Collaborate closely with engineering, product, and quality leaders on cross-functional quality initiatives and release planning
              - listitem [ref=e37]: Provide technical guidance and mentorship to junior SDETs and QA team members, fostering skill development and best practices
              - listitem [ref=e38]: Review code and test cases contributed by other engineers for quality and maintainability
              - listitem [ref=e39]: Maintain accurate and actionable test documentation, reports, and quality metrics for assigned product areas
              - listitem [ref=e40]: Investigate and resolve complex defects and production issues through advanced debugging and root cause analysis
              - listitem [ref=e41]: Advocate for quality and champion adoption of best practices within and across engineering teams
              - listitem [ref=e42]: Proven ability to lead test strategy and risk analysis while making high-impact technical decisions amid ambiguity and prioritizing what matters most.
            - heading "Key qualifications" [level=3] [ref=e43]:
              - strong [ref=e44]: Key qualifications
            - list [ref=e45]:
              - listitem [ref=e46]: Bachelor’s degree in Computer Science or related field, or equivalent experience
              - listitem [ref=e47]: 4+ years of experience in software development and test automation
              - listitem [ref=e48]: Advanced proficiency in multiple programming languages and test automation frameworks
              - listitem [ref=e49]: Deep experience designing, building, and maintaining automation frameworks (e.g., Playwright, Cypress, Selenium, RestAssured)
              - listitem [ref=e50]: Strong expertise in API, UI, and integration testing
              - listitem [ref=e51]: Proficient in CI/CD pipeline integration and optimization
              - listitem [ref=e52]: Skilled in test strategy development, risk analysis, and test architecture
              - listitem [ref=e53]: Advanced debugging, troubleshooting, and root cause analysis
              - listitem [ref=e54]: Solid understanding of database systems and advanced SQL
              - listitem [ref=e55]: Experience with observability and monitoring tools (e.g., DataDog, NewRelic)
              - listitem [ref=e56]: Excellent cross-functional communication and mentorship skills
              - listitem [ref=e57]: Strong written and verbal communication skills; able to collaborate across functions
            - emphasis [ref=e59]: Flex takes a market-based approach to pay, and compensation may vary depending on your primary work location. Work locations are categorized into one of three tiers based on a cost of labor index for that geographic area. The successful candidate’s starting pay will be commensurate with their experience, qualifications, and Flex’s internal leveling guidelines and benchmarks.
            - list [ref=e60]:
              - listitem [ref=e61]:
                - emphasis [ref=e62]:
                  - strong [ref=e63]: "Tier A (NYC/SF):"
                  - text: $136,000—$170,000 USD
              - listitem [ref=e64]:
