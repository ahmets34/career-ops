            - generic [ref=e34]:
              - heading "SR SDET / Sr QA Automation Engineer (Python, CLI, CI/CD, Containers)" [level=2] [ref=e35]
              - text: RAPIDFORT United States (Remote)
            - generic [ref=e37]:
              - generic [ref=e38]:
                - strong [ref=e39]: "Location:"
                - text: Remote (US) |
                - strong [ref=e40]: "Type:"
                - text: Full-Time |
                - strong [ref=e41]: "Experience:"
                - text: 10+ Years
                - strong [ref=e42]: About RapidFort
                - text: RapidFort is the leader in end-to-end software supply chain security. Our platform helps organizations automatically identify, prioritize, and remediate vulnerabilities in containerized applications—without code changes or pipeline disruption. From curated near-zero-CVE container images to runtime Kubernetes protection, we enable teams to ship secure software faster. Backed by $42M in Series A funding and trusted by 100+ customers across defense, federal, and enterprise sectors, we’re defining the new standard for software attack surface management (SASM). We were recognized in the 2025 Gartner® Cool Vendors™ in Container Management report.
                - text: Role Summary
                - text: We’re looking for a hands-on Sr. QA Automation Engineer to own and evolve the Python-based test automation framework for our CLI-driven security platform. You’ll design and maintain end-to-end test suites that validate container image hardening, vulnerability scanning, SBOM generation, and compliance workflows across local, CI, and Kubernetes environments. This role demands strong ownership of test reliability, data-driven execution strategy, and clear documentation—paired with a genuine interest in security tooling.
                - text: What You’ll Work On
                - list [ref=e43]:
                  - listitem [ref=e44]: Build and maintain robust automation suites using Python and pytest
                  - listitem [ref=e45]: Convert manual/bash test plans into scalable, data-driven test frameworks (CSV/JSON/YAML)
                  - listitem [ref=e46]: Design selective execution strategy (tags, ranges, run flags, grouping/sharding)
                  - listitem [ref=e47]: Automate CLI command validation (exit codes, stdout/stderr expectations, failure semantics)
                  - listitem [ref=e48]: Integrate and maintain test execution in CI/CD pipelines (GitHub Actions or equivalent)
                  - listitem [ref=e49]: Validate container image hardening, scan outputs, and SBOM/RBOM generation across base distributions (Ubuntu, RHEL, Debian, Alpine)
                  - listitem [ref=e50]: Manage and improve test artifacts/reporting (.html, .log, .json) for fast triage
                  - listitem [ref=e51]: Troubleshoot environment/auth/configuration drift across runners and VMs
                  - listitem [ref=e52]: Maintain high-quality handover docs, runbooks, and troubleshooting guides
                  - listitem [ref=e53]: Partner with dev/platform teams to stabilize flaky tests and shorten feedback loops
                - strong [ref=e54]: Must-Have Qualifications
                - list [ref=e55]:
                  - listitem [ref=e56]: 10+ years in SDET or QA Automation roles
                  - listitem [ref=e57]: 5+ years of Python automation experience (pytest required)
                  - listitem [ref=e58]: Strong Linux and shell scripting (bash) skills
                  - listitem [ref=e59]: Hands-on experience testing CLI tools or developer workflows
                  - listitem [ref=e60]: Experience with Docker and/or Podman
                  - listitem [ref=e61]: Experience integrating and debugging test runs in CI pipelines
                  - listitem [ref=e62]: Strong debugging skills for authentication, environment, and infra-related failures
                  - listitem [ref=e63]: Solid Git workflow and code review practices
                - strong [ref=e64]: Nice-to-Have Qualifications
                - list [ref=e65]:
                  - listitem [ref=e66]: Kubernetes/KIND/Helm testing experience
                  - listitem [ref=e67]: Compliance/security scan automation exposure (SBOM/STIG-like workflows)
                  - listitem [ref=e68]: Multi-runner parallel execution/sharding strategy experience
                  - listitem [ref=e69]: Experience capturing test telemetry for trend analysis (Postgres/SQLite)
                  - listitem [ref=e70]: Experience building reusable reporting and observability layers
                - text: Base Salary:$120,000- $150,000
